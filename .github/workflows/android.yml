name: Android APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Android Gradle Plugin 8.x) ────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          # Caches ~/.gradle/caches and ~/.gradle/wrapper between runs
          cache: gradle

      # ── Android SDK: install platform 36 + matching build tools ─────────────
      # ubuntu-latest ships the SDK Manager; we install the exact platform and
      # build-tools versions declared in variables.gradle (compileSdk = 36).
      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
          || true   # sdkmanager exits non-zero after printing license prompts; ignore it

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10  # matches workspace pnpm version

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm   # caches the pnpm content-addressable store

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── Web build ────────────────────────────────────────────────────────────
      # VITE_API_BASE_URL must be set in GitHub → Settings → Secrets so that
      # API calls inside the APK resolve to the deployed server.
      # If the secret is absent the app still builds; only API calls will fail
      # at runtime (useful for UI smoke tests without a live backend).
      - name: Build web app
        working-directory: artifacts/pothole-reporter
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          BASE_PATH: /
          PORT: "3000"
        run: pnpm run build

      # ── Capacitor sync ───────────────────────────────────────────────────────
      # Copies dist/public into android/app/src/main/assets/public and
      # writes capacitor.config.json into the assets folder.
      - name: Capacitor sync
        working-directory: artifacts/pothole-reporter
        run: npx cap sync android

      # ── Gradle build ─────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x artifacts/pothole-reporter/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/pothole-reporter/android
        # --no-daemon avoids leaving a background process in the ephemeral runner.
        # --stacktrace surfaces the root cause of any build failure.
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: road-damage-reporter-debug-${{ github.sha }}
          path: artifacts/pothole-reporter/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
