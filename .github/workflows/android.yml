name: Android APK

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Android Gradle Plugin 8.x) ────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      # ── Android SDK ─────────────────────────────────────────────────────────
      # Accept all SDK licenses first, then install the exact platform +
      # build-tools versions declared in variables.gradle (compileSdk = 36).
      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ── Write local.properties ───────────────────────────────────────────────
      # This file is git-ignored but Gradle requires it to locate the Android SDK.
      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > artifacts/pothole-reporter/android/local.properties

      # ── Node + pnpm ──────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── Web build ────────────────────────────────────────────────────────────
      # VITE_API_BASE_URL must be set in GitHub → Settings → Secrets so that
      # API calls inside the APK resolve to the deployed server.
      - name: Build web app
        working-directory: artifacts/pothole-reporter
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          BASE_PATH: /
          PORT: "3000"
          NODE_ENV: production
        run: pnpm run build

      # ── Capacitor sync ───────────────────────────────────────────────────────
      - name: Capacitor sync
        working-directory: artifacts/pothole-reporter
        run: npx cap sync android

      # ── Gradle build ─────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x artifacts/pothole-reporter/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/pothole-reporter/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: road-damage-reporter-debug-${{ github.sha }}
          path: artifacts/pothole-reporter/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
