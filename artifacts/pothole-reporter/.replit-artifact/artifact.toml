kind = "web"
previewPath = "/"
title = "Road Damage Reporter"
version = "1.0.0"
id = "artifacts/pothole-reporter"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21017

[services.development]
run = "pnpm --filter @workspace/pothole-reporter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pothole-reporter", "run", "build" ]
serve = "static"
publicDir = "artifacts/pothole-reporter/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21017"
BASE_PATH = "/"
